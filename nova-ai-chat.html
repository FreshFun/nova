<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0A0E1A">
<title>NOVA — a real AI chat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root{
  --bg:#0A0E1A;
  --surface:#121828;
  --surface2:#171F33;
  --line:#232C45;
  --text:#EDF0FA;
  --muted:#8A93B2;
  --star:#FFB84D;
  --star-hot:#FFD9A0;
  --ice:#9DB8FF;
  --user-bg:#16203A;
  --user-line:#2A3B66;
  --danger:#FF6B6B;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font:15px/1.65 'Outfit',system-ui,sans-serif;
  height:100dvh;
  overflow:hidden;
}
/* faint starfield */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.25) 50%, transparent 51%),
    radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,.18) 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 62% 68%, rgba(255,184,77,.22) 50%, transparent 51%),
    radial-gradient(1px 1px at 32% 82%, rgba(157,184,255,.2) 50%, transparent 51%),
    radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,.15) 50%, transparent 51%),
    radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,.1) 50%, transparent 51%);
}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh}

/* ---------- header ---------- */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--line);
  background:rgba(10,14,26,.82);backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:center;gap:10px;font-family:'Unbounded';font-weight:700;font-size:15px;letter-spacing:.06em}
.brand .star{width:14px;height:14px}
.head-right{display:flex;align-items:center;gap:10px}
.pill{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--muted);
  border:1px solid var(--line);border-radius:999px;padding:5px 10px;
  display:flex;align-items:center;gap:6px;
}
.pill i{width:6px;height:6px;border-radius:50%;background:var(--star);box-shadow:0 0 8px var(--star);display:inline-block}
.ghost{
  font:inherit;font-size:13px;font-weight:500;color:var(--text);
  background:transparent;border:1px solid var(--line);border-radius:10px;
  padding:7px 12px;cursor:pointer;transition:border-color .15s,background .15s;
}
.ghost:hover{border-color:var(--star);background:var(--surface)}
.ghost:focus-visible,.chip:focus-visible,#send:focus-visible{outline:2px solid var(--star);outline-offset:2px}

/* ---------- the star (Nova's identity) ---------- */
.star{
  width:30px;height:30px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 38% 35%, #FFF4DF 0%, var(--star-hot) 28%, var(--star) 55%, #C97A1E 100%);
  box-shadow:0 0 14px rgba(255,184,77,.55), 0 0 34px rgba(255,184,77,.18);
  animation:breathe 4s ease-in-out infinite;
}
.star.thinking{animation:flicker 1s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes flicker{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(.86);filter:brightness(1.35)}}

/* ---------- thread ---------- */
main{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
main::-webkit-scrollbar{width:8px}
main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.thread{max-width:780px;margin:0 auto;padding:26px 16px 12px;display:flex;flex-direction:column;gap:22px}

/* hero */
.hero{text-align:center;padding:7vh 8px 12px}
.hero h1{
  font-family:'Unbounded';font-weight:700;margin:0;
  font-size:clamp(2.6rem,9vw,4.2rem);letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:.08em;
}
.hero .star{width:.72em;height:.72em;margin:0 .04em}
.hero p{color:var(--muted);margin:14px auto 0;max-width:420px;font-size:15.5px}
.chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:10px;max-width:620px;margin:30px auto 0}
.chip{
  text-align:left;font:inherit;font-size:13.5px;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:13px 14px;cursor:pointer;transition:all .15s;
}
.chip:hover{border-color:var(--star);color:var(--text);transform:translateY(-1px)}

/* messages */
.msg{animation:rise .3s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{
  align-self:flex-end;max-width:86%;
  background:var(--user-bg);border:1px solid var(--user-line);color:#DCE6FF;
  padding:11px 15px;border-radius:16px 16px 4px 16px;
  white-space:pre-wrap;word-wrap:break-word;
}
.msg.bot{display:flex;gap:12px;align-items:flex-start}
.msg.bot .content{
  min-width:0;flex:1;padding:2px 0 0;
  border-left:2px solid transparent;
  border-image:linear-gradient(180deg,var(--star) 0%,transparent 90%) 1;
  padding-left:14px;
}
.msg.bot .who{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--star);
  text-transform:uppercase;margin-bottom:4px;
}
.msg.err .content{border-image:linear-gradient(180deg,var(--danger),transparent 90%) 1;color:#FFC9C9}
.msg.err .who{color:var(--danger)}
.retry{
  margin-top:8px;font:inherit;font-size:13px;color:var(--text);
  background:var(--surface);border:1px solid var(--danger);border-radius:8px;
  padding:6px 12px;cursor:pointer;
}
.thinking-label{font-family:var(--mono);font-size:12px;color:var(--muted)}
.thinking-label::after{content:"";animation:dots 1.4s steps(4) infinite}
@keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}

/* markdown inside bot messages */
.content p{margin:.55em 0}
.content p:first-child{margin-top:0}
.content h1,.content h2,.content h3{font-family:'Outfit';font-weight:600;margin:1em 0 .4em;line-height:1.3}
.content h1{font-size:1.35em}.content h2{font-size:1.2em}.content h3{font-size:1.05em}
.content ul,.content ol{margin:.5em 0;padding-left:1.4em}
.content li{margin:.25em 0}
.content a{color:var(--ice)}
.content blockquote{margin:.7em 0;padding:.2em 1em;border-left:3px solid var(--line);color:var(--muted)}
.content hr{border:0;border-top:1px solid var(--line);margin:1em 0}
.content table{border-collapse:collapse;margin:.7em 0;font-size:14px;display:block;overflow-x:auto}
.content th,.content td{border:1px solid var(--line);padding:6px 12px}
.content th{background:var(--surface)}
.content code{font-family:var(--mono);font-size:.88em;background:var(--surface2);padding:2px 6px;border-radius:6px}
.content pre{
  position:relative;background:#0D1322;border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;overflow-x:auto;margin:.8em 0;
}
.content pre code{background:none;padding:0;font-size:13px;line-height:1.6}
.copy-btn{
  position:absolute;top:8px;right:8px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);border-radius:7px;
  padding:4px 9px;cursor:pointer;opacity:0;transition:opacity .15s;
}
.content pre:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--star);border-color:var(--star)}
@media (hover:none){.copy-btn{opacity:.85}}

/* ---------- composer ---------- */
footer{padding:10px 14px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,var(--bg) 35%)}
.composer{
  max-width:780px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
  background:var(--surface2);border:1px solid var(--line);border-radius:18px;
  padding:10px 10px 10px 16px;transition:border-color .15s;
}
.composer:focus-within{border-color:var(--star)}
#input{
  flex:1;background:none;border:0;outline:0;resize:none;
  color:var(--text);font:inherit;line-height:1.5;max-height:170px;padding:6px 0;
}
#input::placeholder{color:var(--muted)}
#send{
  width:40px;height:40px;border:0;border-radius:13px;flex:none;cursor:pointer;
  background:var(--star);color:#1A1206;display:grid;place-items:center;
  transition:transform .12s,opacity .15s;
}
#send:hover{transform:translateY(-1px)}
#send:disabled{opacity:.35;cursor:default;transform:none}
.hint{
  max-width:780px;margin:8px auto 0;text-align:center;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted);
}
@media (max-width:520px){
  .ghost span{display:none}
  .hint .desk{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand"><div class="star" aria-hidden="true"></div>NOVA</div>
    <div class="head-right">
      <div class="pill"><i></i>Claude Sonnet</div>
      <button class="ghost" id="newChat" title="Start a new chat">＋<span> New chat</span></button>
    </div>
  </header>

  <main id="scroller">
    <div class="thread" id="thread"></div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Ask Nova anything…" aria-label="Message"></textarea>
      <button id="send" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </div>
    <div class="hint">A real AI — powered by Claude<span class="desk"> · Enter to send · Shift+Enter for a new line</span></div>
  </footer>

</div>

<script>
/* ============================================================
   NOVA — a fully working AI chat.
   Every reply comes live from the Claude API. Nothing is faked.
   ============================================================ */

const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL   = "claude-sonnet-4-6";

const SYSTEM = `You are Nova — a sharp, warm AI assistant living inside a sleek chat website.
You are excellent at programming: when asked for code, write complete, working code inside fenced markdown blocks with the correct language tag.
You are also great at math, writing, explaining hard ideas simply, and brainstorming.
Be direct and friendly. Always format responses in Markdown. Match your length to the task — short for simple questions, thorough for complex ones.`;

const messages = [];          // full conversation memory {role, content}
let busy = false;

const thread   = document.getElementById("thread");
const scroller = document.getElementById("scroller");
const input    = document.getElementById("input");
const sendBtn  = document.getElementById("send");

/* ---------- hero / empty state ---------- */
function buildHero(){
  const h = document.createElement("div");
  h.className = "hero";
  h.id = "hero";
  h.innerHTML = `
    <h1>N<span class="star" aria-label="O"></span>VA</h1>
    <p>A real AI, live in your browser. It writes code, fixes bugs, explains anything, and remembers the whole conversation.</p>
    <div class="chips">
      <button class="chip">🐍 Code a snake game in Python</button>
      <button class="chip">🕳️ Explain black holes simply</button>
      <button class="chip">🐞 Find the bug: <code>for(i=0;i<10;i--)</code></button>
      <button class="chip">✍️ Write a two-sentence horror story</button>
    </div>`;
  h.querySelectorAll(".chip").forEach(c =>
    c.addEventListener("click", () => sendMessage(c.textContent.trim()))
  );
  thread.appendChild(h);
}
buildHero();

/* ---------- rendering helpers ---------- */
function scrollDown(){
  scroller.scrollTo({ top: scroller.scrollHeight, behavior: "smooth" });
}

function renderMarkdown(text){
  if (window.marked && window.DOMPurify){
    marked.setOptions({ gfm: true, breaks: true });
    return DOMPurify.sanitize(marked.parse(text));
  }
  const esc = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return "<p>" + esc.replace(/\n/g,"<br>") + "</p>";
}

function enhance(el){
  el.querySelectorAll("pre").forEach(pre => {
    const code = pre.querySelector("code");
    if (code && window.hljs){ try { hljs.highlightElement(code); } catch(e){} }
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "copy";
    btn.addEventListener("click", () => {
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
      btn.textContent = "copied ✓";
      setTimeout(() => btn.textContent = "copy", 1400);
    });
    pre.appendChild(btn);
  });
  el.querySelectorAll("a").forEach(a => { a.target = "_blank"; a.rel = "noopener"; });
}

function addUser(text){
  const d = document.createElement("div");
  d.className = "msg user";
  d.textContent = text;
  thread.appendChild(d);
  scrollDown();
}

function addBot(text){
  const d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = `<div class="star" aria-hidden="true"></div>
                 <div class="content"><div class="who">Nova</div></div>`;
  const body = document.createElement("div");
  body.innerHTML = renderMarkdown(text);
  enhance(body);
  d.querySelector(".content").appendChild(body);
  thread.appendChild(d);
  scrollDown();
}

function addThinking(){
  const d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = `<div class="star thinking" aria-hidden="true"></div>
                 <div class="content"><div class="who">Nova</div>
                 <div class="thinking-label">thinking</div></div>`;
  thread.appendChild(d);
  scrollDown();
  return d;
}

function addError(msg){
  const d = document.createElement("div");
  d.className = "msg bot err";
  d.innerHTML = `<div class="star" aria-hidden="true" style="filter:grayscale(.6)"></div>
                 <div class="content"><div class="who">Signal lost</div></div>`;
  const p = document.createElement("p");
  p.textContent = msg + " — check your connection and try again.";
  const retry = document.createElement("button");
  retry.className = "retry";
  retry.textContent = "Retry";
  retry.addEventListener("click", () => { d.remove(); requestReply(); });
  d.querySelector(".content").append(p, retry);
  thread.appendChild(d);
  scrollDown();
}

/* ---------- the actual AI call ---------- */
async function requestReply(){
  busy = true;
  sendBtn.disabled = true;
  const typing = addThinking();

  try {
    // keep the last 40 turns; history must start on a user turn
    let history = messages.slice(-40);
    while (history.length && history[0].role !== "user") history.shift();

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    if (!res.ok || data.error){
      throw new Error(data?.error?.message || "Request failed (" + res.status + ")");
    }

    const reply = (data.content || [])
      .map(b => b.type === "text" ? b.text : "")
      .filter(Boolean)
      .join("\n\n") || "…";

    messages.push({ role: "assistant", content: reply });
    typing.remove();
    addBot(reply);

  } catch (err){
    typing.remove();
    addError(err.message || "Something went wrong");
  } finally {
    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function sendMessage(text){
  text = (text || "").trim();
  if (!text || busy) return;
  document.getElementById("hero")?.remove();
  addUser(text);
  messages.push({ role: "user", content: text });
  input.value = "";
  input.style.height = "auto";
  requestReply();
}

/* ---------- composer wiring ---------- */
sendBtn.addEventListener("click", () => sendMessage(input.value));

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage(input.value);
  }
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 170) + "px";
});

document.getElementById("newChat").addEventListener("click", () => {
  messages.length = 0;
  thread.innerHTML = "";
  buildHero();
  input.focus();
});

input.focus();
</script>
</body>
</html>
