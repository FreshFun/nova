<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0A0E1A">
<meta name="description" content="NOVA — a real AI chat, live on FreshFun.">
<title>NOVA — a real AI chat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- This is the engine: free, keyless AI that works on any website -->
<script src="https://js.puter.com/v2/"></script>
</head>
<body>

<div class="stars" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="orb orb-sm" aria-hidden="true"></span>
    <span class="brand-name">NOVA</span>
  </div>
  <div class="topbar-right">
    <span class="model-badge"><span class="dot" aria-hidden="true"></span>Claude&nbsp;Sonnet</span>
    <button id="newChatBtn" class="icon-btn" type="button" title="New chat" aria-label="Start a new chat">+</button>
  </div>
</header>

<main id="chat" class="chat" aria-live="polite"></main>

<div class="composer-wrap">
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Ask Nova anything…" aria-label="Message Nova"></textarea>
    <button id="sendBtn" class="send-btn" type="button" aria-label="Send message">↑</button>
  </div>
  <p class="tagline">A real AI — powered by Claude</p>
</div>

<noscript><p class="noscript">Nova needs JavaScript to think. Turn it on and reload.</p></noscript>

<script src="script.js"></script>
</body>
</html>
